services:

  # ── BACKEND ─────────────────────────────────────────────────
  - type: web
    name: master-ai-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: BOT_TOKEN
        sync: true
      - key: ADMIN_TELEGRAM_ID
        sync: true
      - key: FIREBASE_SERVICE_ACCOUNT_B64
        sync: true
      - key: WEBHOOK_SECRET
        sync: true
      - key: RENDER_EXTERNAL_URL
        sync: true

  # ── FRONTEND ────────────────────────────────────────────────
  - type: web
    name: master-ai-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
